name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  ci:
    name: Lint + Typecheck + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Frontend (PWA) ──────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Tests (frontend)
        run: npm test

      # ── Backend (API server) ────────────────────────────────────────────────

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Typecheck (server)
        run: npm run typecheck
        working-directory: server

      - name: Tests (server)
        run: npm test
        working-directory: server

      # ── Coverage report (server) ─────────────────────────────────────────────
      # Generates an HTML + JSON coverage report for VUU-34 QA gate.
      # The report is uploaded as a workflow artifact so reviewers can inspect it.
      - name: Coverage report (server)
        run: npx vitest run --coverage
        working-directory: server
        continue-on-error: true  # coverage step doesn't break CI gate; test step above does

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14
